<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تعلم الإنجليزية - الإحصائيات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./stats.css">
</head>
<body>
    <div class="phone-container">
        <!-- شاشة الإحصائيات -->
        <div id="stats-screen" class="screen active">
            <header class="app-header">
                <div class="logo">
                    <div class="logo-icon">E</div>
                    <div class="logo-text">
                        <h1>الإحصائيات</h1>
                        <p>تتبع تقدمك التعليمي</p>
                    </div>
                </div>
                <a href="../home/home.html" class="btn-icon back-btn">
                    <i class="fas fa-arrow-right"></i>
                </a>
            </header>

            <main class="main-content">
                <!-- المؤشر العام للطالب -->
                <div class="card general-stats-card">
                    <h3><i class="fas fa-chart-pie"></i> المؤشر العام</h3>
                    <div class="general-stats-grid">
                        <div class="general-stat-item">
                            <div class="general-stat-icon correct">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="general-stat-content">
                                <div class="general-stat-value">0</div>
                                <div class="general-stat-label">إجابة صحيحة</div>
                            </div>
                        </div>
                        <div class="general-stat-item">
                            <div class="general-stat-icon wrong">
                                <i class="fas fa-times-circle"></i>
                            </div>
                            <div class="general-stat-content">
                                <div class="general-stat-value">0</div>
                                <div class="general-stat-label">إجابة خاطئة</div>
                            </div>
                        </div>
                        <div class="general-stat-item">
                            <div class="general-stat-icon average">
                                <i class="fas fa-percentage"></i>
                            </div>
                            <div class="general-stat-content">
                                <div class="general-stat-value">0%</div>
                                <div class="general-stat-label">المعدل العام</div>
                            </div>
                        </div>
                        <div class="general-stat-item">
                            <div class="general-stat-icon points">
                                <i class="fas fa-star"></i>
                            </div>
                            <div class="general-stat-content">
                                <div class="general-stat-value">0</div>
                                <div class="general-stat-label">النقاط</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- تفاصيل القواعد اللغوية -->
                <div class="card grammar-details-card">
                    <div class="card-header-collapsible" onclick="toggleGrammarDetails()">
                        <h3><i class="fas fa-language"></i> تفاصيل القواعد اللغوية</h3>
                        <i class="fas fa-chevron-down collapse-icon rotated" id="grammar-collapse-icon"></i>
                    </div>
                    <div class="grammar-details-content expanded" id="grammar-details-content">
                        <!-- سيتم ملؤها ديناميكياً -->
                    </div>
                </div>

                <!-- زر تفريغ الإحصاءات -->
                <div class="card reset-stats-card">
                    <button class="btn btn-danger" onclick="resetAllStats()" style="width: 100%; background: #EF4444; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="fas fa-trash"></i> تفريغ جميع الإحصاءات
                    </button>
                </div>
            </main>
        </div>

        <!-- التنقل السفلي -->
        <nav class="bottom-nav">
            <a href="../home/home.html" class="nav-item">
                <i class="fas fa-road"></i>
                <span>المسار</span>
            </a>
            <a href="../lessons/lessons.html" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>الحصص</span>
            </a>
            <a href="../exams/exams.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>الامتحانات</span>
            </a>
            <a href="stats.html" class="nav-item active">
                <i class="fas fa-chart-bar"></i>
                <span>الإحصائيات</span>
            </a>
        </nav>
    </div>

    <script type="module" src="./stats.js"></script>
</body>
</html>
