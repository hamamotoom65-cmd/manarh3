<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تعلم الإنجليزية - الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./home.css">
</head>
<body>
    <div class="phone-container">
        <!-- شاشة المسار -->
        <div id="path-screen" class="screen active">
            <header class="app-header">
                <div class="logo">
                    <div class="logo-icon">E</div>
                    <div class="logo-text">
                        <h1>تعلم الإنجليزية</h1>
                        <p>مسارك التلقائي للتعلم</p>
                    </div>
                </div>
                <div class="user-profile">
                    <div class="user-avatar">م</div>
                </div>
            </header>

            <main class="main-content">
                <div class="card path-card">
                    <div class="path-header">
                        <h2><i class="fas fa-road"></i> مسارك التعليمي</h2>
                        <span class="badge">مسار تلقائي</span>
                    </div>
                    
                    <div class="motivational-message">
                        <p>🌟 كل يوم تعلم خطوة نحو النجاح!</p>
                        <p>استمتع بالتعلم واكتشف عالماً جديداً من اللغة الإنجليزية</p>
                    </div>
                    
                    <button class="btn btn-primary" onclick="openUnitSelector()">
                        <i class="fas fa-play-circle"></i> ابدأ التعلم الآن
                    </button>
                    
                    <div class="guide-container">
                        <div class="guide-card">
                            <div class="guide-header">
                                <div class="guide-icon"><i class="fas fa-comments"></i></div>
                                <h4>رفيق</h4>
                            </div>
                            <p class="guide-message">مرحبًا! أنا رفيق، سأرشدك في رحلة تعلم الإنجليزية. اختر وحدة وابدأ التعلم الآن!</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- نافذة اختيار الوحدة -->
        <div id="unit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>اختر الوحدة</h3>
                    <button class="modal-close" onclick="closeUnitModal()">✕</button>
                </div>
                <div class="units-list">
                    <!-- سيتم ملؤها بالجافاسكريبت -->
                </div>
            </div>
        </div>

        <!-- التنقل السفلي -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <i class="fas fa-road"></i>
                <span>المسار</span>
            </a>
            <a href="../lessons/lessons.html" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>الحصص</span>
            </a>
            <a href="../exams/exams.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>الامتحانات</span>
            </a>
            <a href="../stats/stats.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>الإحصائيات</span>
            </a>
        </nav>
    </div>

    <script src="./home.js"></script>
</body>
</html>
